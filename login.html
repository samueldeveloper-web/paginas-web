<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | TREX</title>
    <meta
      name="description"
      content="Ingreso seguro al panel administrativo de TREX usando Supabase Auth."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="login">
    <div class="site-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="logotrex.jpeg" alt="Logo TREX" />
          <div>
            <p class="eyebrow">Acceso protegido</p>
            <a class="brand-name" href="index.html">TREX Login</a>
          </div>
        </div>

        <nav class="main-nav">
          <a href="index.html">Inicio</a>
          <a href="carrito.html">Carrito</a>
          <a href="login.html">Login</a>
        </nav>
      </header>

      <main class="admin-page">
        <section class="admin-hero">
          <div>
            <p class="eyebrow">Supabase Auth</p>
            <h1>Ingresa al panel admin de forma segura.</h1>
            <p class="hero-text">
              Este acceso usa Supabase Auth con sesion real. No hay contrasenas
              hardcodeadas ni validacion manual en JavaScript.
            </p>
          </div>
        </section>

        <section class="admin-layout">
          <section class="admin-card">
            <div class="section-heading">
              <p class="eyebrow">Login</p>
              <h2>Credenciales de administrador</h2>
            </div>

            <form class="admin-form" id="login-form">
              <label class="admin-field">
                <span>Email</span>
                <input id="login-email" type="email" autocomplete="email" required />
              </label>

              <label class="admin-field">
                <span>Contrasena</span>
                <input id="login-password" type="password" autocomplete="current-password" required />
              </label>

              <div class="admin-actions">
                <button class="btn btn-primary" type="submit">Iniciar sesion</button>
              </div>
            </form>

            <p class="admin-status" id="login-status"></p>
          </section>
        </section>
      </main>
    </div>

    <script src="app-config.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
